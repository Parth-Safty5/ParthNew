<style>
:root {
    --primary: #0056b3;
    --secondary: #e9ecef;
    --text: #333;
    --accent: #ffc107;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background-color: #f8f9fa; color: var(--text); padding-bottom: 50px; }

/* Navbar */
.main-nav {
    background: #fff;
    padding: 0 10%;
    height: 75px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 1000;
    font-family: 'Roboto', sans-serif;
}
.logo { display: flex; align-items: center; text-decoration: none; gap: 12px; }
.logo-img { height: 50px; width: 50px; border-radius: 50%; object-fit: cover; }
.logo h3 { font-size: 1.6rem; font-weight: 700; color: #000; margin: 0; }
.logo h3 span { color: #ffc107; }

.nav-links { display: flex; list-style: none; margin: 0; padding: 0; }
.nav-links li a { text-decoration: none; color: #333; margin-left: 25px; font-weight: 500; }

.hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; }
.hamburger span { width: 25px; height: 3px; background: #333; transition: 0.3s; }

/* Hero Title */
.section-title {
    text-align: center;
    padding: 40px 20px;
    background: white;
    margin-bottom: 30px;
}
.section-title h1 { font-size: 1.8rem; margin-bottom: 10px; }
.section-title p { color: #666; font-size: 0.95rem; }

/* Main Container */
.content-wrapper {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 15px;
}
/* Chapter List Design */
.chapter-list {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    border: 1px solid #e0e0e0;
}
.chapter-link {
    display: flex;
    align-items: center;
    padding: 18px 25px;
    text-decoration: none;
    color: var(--text);
    border-bottom: 1px solid #f0f0f0;
    transition: all 0.2s ease;
    font-weight: 500;
}
.chapter-link:last-child { border-bottom: none; }
.chapter-link:hover {
    background-color: #f0f7ff;
    padding-left: 35px;
    color: var(--primary);
}
.chapter-index {
    background: var(--secondary);
    color: #555;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    margin-right: 15px;
    font-size: 0.85rem;
    font-weight: 700;
}
.chapter-link:hover .chapter-index {
    background: var(--primary);
    color: white;
}
.arrow { margin-left: auto; color: #ccc; font-weight: bold; }

/* Category Badge */
.subject-badge {
    display: inline-block;
    background: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 10px;
}

/* Footer */
.mini-footer {
    background: #003087;
    padding: 40px 0;
    text-align: center;
    font-family: 'Roboto', sans-serif;
    color: white;
}
.footer-links-container {
    margin-bottom: 15px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
}
.footer-link {
    color: white;
    text-decoration: none;
    font-size: 14px;
    opacity: 0.8;
    transition: 0.3s;
    padding: 5px 10px;
}
.footer-link:hover {
    color: #ffc107;
    opacity: 1;
}
.footer-separator {
    color: rgba(255, 255, 255, 0.3);
    display: inline;
}
.copyright-text {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    margin: 0;
}

/* Responsive */
@media (max-width: 768px) {
    .hamburger { display: flex; }
    .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 75px;
        left: 0;
        width: 100%;
        background: white;
        padding: 20px 0;
        box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }
    .nav-links.active { display: flex !important; }
    .nav-links li { margin: 15px 0; text-align: center; }
    .nav-links li a { margin: 0; font-size: 1.2rem; }
    .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
    .footer-links-container { flex-direction: column; gap: 10px; }
    .footer-separator { display: none; }
}
</style>
